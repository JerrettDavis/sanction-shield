name: Bug Report
description: Report a bug in SanctionShield
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Call POST /api/v1/screen with...
        2. Observe that...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: SanctionShield version or commit hash.
      placeholder: v0.1.0

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local (SQLite)
        - Production (Supabase)
        - Both
    validations:
      required: true
